# Re-included in every location because nginx's add_header inheritance is
# reset whenever a location declares its own add_header (e.g. for caching).
add_header Content-Security-Policy "default-src 'none'; script-src 'self' https://accounts.google.com; connect-src 'self' https://privilegedaccessmanager.googleapis.com https://oauth2.googleapis.com https://openidconnect.googleapis.com https://accounts.google.com https://www.googleapis.com; style-src 'self'; img-src 'self' https://*.googleusercontent.com data:; font-src 'self' data:; manifest-src 'self'; frame-src https://accounts.google.com; frame-ancestors 'none'; base-uri 'none'; form-action 'none'; object-src 'none'" always;
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "no-referrer" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=(), payment=()" always;
add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
