worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Run as non-root: write all temp/cache state under /tmp.
  client_body_temp_path /tmp/nginx-client-body;
  proxy_temp_path /tmp/nginx-proxy;
  fastcgi_temp_path /tmp/nginx-fastcgi;
  uwsgi_temp_path /tmp/nginx-uwsgi;
  scgi_temp_path /tmp/nginx-scgi;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  server_tokens off;

  # GKE/Cloud Logging picks up JSON on stdout and gives the `httpRequest` and
  # `severity` fields special treatment (rendered as a structured HTTP entry
  # in the Logs Explorer). escape=json safely encodes user-controlled fields
  # like User-Agent and Referer.
  map $status $log_severity {
    default  "INFO";
    ~^3      "INFO";
    ~^4      "WARNING";
    ~^5      "ERROR";
  }
  log_format json_combined escape=json
    '{'
      '"severity":"$log_severity",'
      '"time":"$time_iso8601",'
      '"message":"$request_method $request_uri $status",'
      '"httpRequest":{'
        '"requestMethod":"$request_method",'
        '"requestUrl":"$scheme://$host$request_uri",'
        '"status":$status,'
        '"responseSize":"$body_bytes_sent",'
        '"userAgent":"$http_user_agent",'
        '"remoteIp":"$remote_addr",'
        '"referer":"$http_referer",'
        '"protocol":"$server_protocol",'
        '"latency":"${request_time}s"'
      '}'
    '}';
  access_log /dev/stdout json_combined;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_vary on;

  include /etc/nginx/conf.d/*.conf;
}
