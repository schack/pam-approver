server {
  listen 8080 default_server;
  listen [::]:8080 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  absolute_redirect off;
  server_tokens off;

  # No body upload, this is a static site.
  client_max_body_size 8k;
  client_body_buffer_size 8k;
  large_client_header_buffers 2 4k;

  # ---- HTML / runtime config: never cache ---------------------------------
  location = /index.html {
    include /etc/nginx/snippets/security-headers.conf;
    add_header Cache-Control "no-store" always;
  }
  location = / {
    include /etc/nginx/snippets/security-headers.conf;
    add_header Cache-Control "no-store" always;
    try_files /index.html =404;
  }
  # Runtime config is rendered by entrypoint.sh into /var/lib/pam-approver (kept
  # off the read-only rootfs and overlaid by an emptyDir under Kubernetes).
  location = /config.js {
    include /etc/nginx/snippets/security-headers.conf;
    add_header Cache-Control "no-store" always;
    # Content-Type comes from mime.types (.js → application/javascript). Do NOT
    # set it with add_header — that appends a *second* Content-Type rather than
    # replacing nginx's, yielding a duplicate header.
    alias /var/lib/pam-approver/config.js;
  }

  # Web app manifest: nginx mime.types doesn't map .webmanifest. Set the type
  # with default_type (which replaces nginx's fallback), NOT add_header — the
  # latter appends a second Content-Type, and with nosniff the browser sees the
  # octet-stream fallback first and rejects the manifest.
  location = /site.webmanifest {
    include /etc/nginx/snippets/security-headers.conf;
    add_header Cache-Control "no-cache" always;
    default_type application/manifest+json;
    try_files $uri =404;
  }

  # ---- Static assets: cache but always revalidate -------------------------
  # Filenames are not content-hashed, so a long max-age would serve stale
  # JS/CSS for up to its lifetime after a deploy. "no-cache" lets the browser
  # keep the file but revalidate against nginx's ETag every time — a cheap 304
  # when unchanged, the fresh asset the moment a deploy changes it.
  location ~* \.(css|js|svg|woff2?|ico|png|jpg)$ {
    include /etc/nginx/snippets/security-headers.conf;
    add_header Cache-Control "no-cache" always;
    try_files $uri =404;
  }

  # ---- Liveness ------------------------------------------------------------
  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  # ---- Catch-all (no client-side routing, so unknown paths 404) -----------
  location / {
    include /etc/nginx/snippets/security-headers.conf;
    add_header Cache-Control "no-store" always;
    try_files $uri =404;
  }
}
