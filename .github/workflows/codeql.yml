name: CodeQL

# Static analysis of the JavaScript source with CodeQL. Runs on every PR and
# push to main, plus a weekly scheduled scan. Results appear in the Security tab.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "37 4 * * 1"  # weekly, Monday 04:37 UTC (off the hour)

permissions: {}

jobs:
  analyze:
    name: Analyze JavaScript
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # upload CodeQL findings to code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: javascript-typescript

      # No build step: JavaScript is interpreted, so CodeQL extracts it directly.
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
