name: Release Drafter

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize, edited]

permissions: {}

jobs:
  # On merges to main: refresh the draft release notes. The merged PR's label
  # (applied by the autolabel job below while it was open) decides its category.
  update_release_draft:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create / update the draft release
    steps:
      - name: Checkout (full history so existing tags are visible)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      # CalVer YEAR.MONTH.SEQUENCE: the third number counts releases already cut
      # this month and increments. It is derived from published tags, so it
      # stays put across an unpublished batch of merges and only advances once a
      # release is actually published. New month rolls back to .0.
      - name: Compute CalVer
        id: calver
        run: |
          ym="$(date -u +%Y.%-m)"
          last="$(git tag -l "${ym}.*" | sed -E "s/^${ym}\.//" | grep -E '^[0-9]+$' | sort -n | tail -1)"
          next=$(( ${last:--1} + 1 ))
          echo "version=${ym}.${next}" >> "$GITHUB_OUTPUT"

      - name: Update release draft
        uses: release-drafter/release-drafter@ed4bc48ec97379be2258e7b7ac2624a3e26ab809 # v7.4.0
        with:
          version: ${{ steps.calver.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # On a (same-repo) PR: apply the category label from the title/branch using
  # release-drafter's dedicated autolabeler. In v7 the main action only drafts;
  # autolabeling moved to this separate sub-action. It reads the `autolabeler:`
  # block in .github/release-drafter.yml.
  autolabel:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # the autolabeler writes labels onto the PR
    steps:
      - uses: release-drafter/release-drafter/autolabeler@ed4bc48ec97379be2258e7b7ac2624a3e26ab809 # v7.4.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
