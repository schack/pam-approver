name: Release Drafter

on:
  push:
    branches: [main]
  # Needed for the autolabeler to label PRs as they are opened or updated.
  pull_request:
    types: [opened, reopened, synchronize]

permissions: {}

jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    # Push to main always runs (draft update). PRs run only from same-repo
    # branches: a fork PR can't be granted pull-requests:write, so the
    # autolabeler would fail there. Fork PRs get labelled by a maintainer.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write       # create / update the draft release
      pull-requests: write  # autolabeler writes labels onto PRs
    steps:
      - name: Checkout (full history so existing tags are visible)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      # CalVer YEAR.MONTH.SEQUENCE: the third number counts releases already cut
      # this month and increments. It is derived from published tags, so it
      # stays put across an unpublished batch of merges and only advances once a
      # release is actually published. New month rolls back to .0.
      - name: Compute CalVer
        id: calver
        run: |
          ym="$(date -u +%Y.%-m)"
          last="$(git tag -l "${ym}.*" | sed -E "s/^${ym}\.//" | grep -E '^[0-9]+$' | sort -n | tail -1)"
          next=$(( ${last:--1} + 1 ))
          echo "version=${ym}.${next}" >> "$GITHUB_OUTPUT"

      - name: Update release draft / autolabel PRs
        uses: release-drafter/release-drafter@ed4bc48ec97379be2258e7b7ac2624a3e26ab809 # v7.4.0
        with:
          version: ${{ steps.calver.outputs.version }}
          # Split by event: on push to main, draft the release (no autolabel).
          # On a pull_request, only autolabel; do not draft against the PR ref
          # (that path was running instead of the autolabeler, and produced the
          # "refs/pull/N/merge is not supported" warning).
          disable-releaser: ${{ github.event_name == 'pull_request' }}
          disable-autolabeler: ${{ github.event_name != 'pull_request' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
