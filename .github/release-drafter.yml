# Drafts the next release's notes from merged PRs. The version is injected by
# the workflow (auto CalVer YEAR.MONTH.SEQUENCE), so the templates just echo it.
name-template: '$RESOLVED_VERSION'
tag-template: '$RESOLVED_VERSION'

# Each merged PR is filed under the category whose label it carries.
categories:
  - title: '🔒 Security'
    when:
      labels: [security]
  - title: '✨ Features'
    when:
      labels: [enhancement]
  - title: '🐛 Fixes'
    when:
      labels: [fix, bug]
  - title: '📦 Dependencies'
    when:
      labels: [dependencies]

change-template: '- $TITLE (#$NUMBER)'
no-changes-template: '- No user-facing changes.'

# Applied by the dedicated v7 autolabeler sub-action (see the `autolabel` job in
# .github/workflows/release-drafter.yml) from the PR title or branch. Dependabot
# adds `dependencies` itself.
autolabeler:
  - label: enhancement
    title: ['/^feat(\(.+\))?[:!]/i']
    branch: ['/^feat\//i']
  - label: fix
    title: ['/^fix(\(.+\))?[:!]/i']
    branch: ['/^fix\//i']
  - label: security
    title: ['/\bsec(urity)?\b/i']
    branch: ['/^sec(urity)?\//i']

template: |
  ## What changed

  $CHANGES
